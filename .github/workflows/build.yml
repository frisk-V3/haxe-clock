name: Build Haxe Clock

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Install Haxe
        uses: krdlab/setup-haxe@v1
        with:
          haxe-version: latest

      - name: Build
        run: haxe main.hxml

      - name: Upload dist
        uses: actions/upload-artifact@v3
        with:
          name: dist
          path: dist
