name: Haxe Build Smoke Test

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: {}

concurrency:
  group: haxe-clock-smoke
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Haxe (avoid Neko)
        uses: krdlab/setup-haxe@v1
        with:
          haxe-version: 4.3.7

      - name: Show Haxe info
        run: |
          haxe --version
          haxelib version || true

      - name: Repo quick listing
        run: |
          echo "PWD: $(pwd)"
          echo "Root files:"
          ls -la
          echo "src files:"
          ls -la src || true

      - name: Normalize potential BOM/CRLF in project files
        run: |
          set -e
          for f in main.hxml src/*.hx; do
            if [ -f "$f" ]; then
              # remove UTF-8 BOM if present
              sed -i '1s/^\xEF\xBB\xBF//' "$f" || true
              # convert CRLF -> LF if dos2unix available
              if command -v dos2unix >/dev/null 2>&1; then
                dos2unix "$f" || true
              else
                tr -d '\r' < "$f" > "$f.tmp" && mv "$f.tmp" "$f" || true
              fi
            fi
          done

      - name: Build (Haxe -> JS)
        run: |
          set -e
          mkdir -p dist
          # prefer main.hxml if present, otherwise build directly from src
          if [ -f main.hxml ]; then
            echo "Using main.hxml"
            haxe main.hxml
          else
            echo "No main.hxml found; building with explicit flags"
            haxe -cp src -main Main -js dist/main.js
          fi

      - name: Verify build output exists and is non-empty
        run: |
          set -e
          if [ ! -d dist ]; then
            echo "dist/ not found" >&2
            exit 1
          fi
          if [ ! -f dist/main.js ]; then
            echo "dist/main.js not found" >&2
            ls -la dist
            exit 1
          fi
          size=$(wc -c < dist/main.js || echo 0)
          echo "dist/main.js size: $size bytes"
          if [ "$size" -lt 200 ]; then
            echo "dist/main.js looks too small; possible build error" >&2
            ls -la dist
            sed -n '1,200p' dist/main.js || true
            exit 1
          fi
          # quick sanity check for Haxe-generated marker
          if grep -q "Generated by Haxe" dist/main.js; then
            echo "Found Haxe marker in dist/main.js"
          else
            echo "Haxe marker not found; showing head of file for inspection"
            sed -n '1,80p' dist/main.js || true
          fi

      - name: Smoke result
        run: echo "Build smoke test passed: dist/main.js exists and looks valid"
