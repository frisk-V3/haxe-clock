<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Haxe Clock</title>
  <style>
    :root { --bg:#111; --fg:#0f0; --font: "Courier New", Courier, monospace; }
    html,body { height:100%; margin:0; background:var(--bg); color:var(--fg); font-family:var(--font); }
    .wrap { display:flex; align-items:center; justify-content:center; height:100%; }
    canvas { display:block; background:transparent; }
    .no-js { color:#f66; font-size:18px; text-align:center; }
  </style>
</head>
<body>
  <div class="wrap">
    <canvas id="clock" width="600" height="200" aria-label="Digital clock"></canvas>
  </div>

  <script src="dist/main.js"></script>


  <noscript>
    <div class="no-js">JavaScript が無効です。ブラウザで JavaScript を有効にしてください。</div>
  </noscript>
</body>
</html>
